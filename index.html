<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Messenger Group Chat — iPhone 16 Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<style>
/* Messenger Group Chat — iPhone 16 Pro Clone */

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro", "Helvetica Neue", sans-serif;
  background: #f0f2f5;
  color: #050505;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

.app-shell {
  min-height: 100vh;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  gap: 48px;
  padding: 40px 32px;
  background:
    radial-gradient(1200px 600px at 20% 0%, #e7f0ff 0%, transparent 55%),
    radial-gradient(900px 500px at 90% 20%, #efe6ff 0%, transparent 60%),
    #f0f2f5;
}

.phone-col {
  flex: 0 0 auto;
  position: sticky;
  top: 40px;
}

.panel-col {
  flex: 1 1 auto;
  max-width: 480px;
  min-width: 360px;
}

/* ===== iPhone 16 Pro frame ===== */
.iphone16 {
  width: 390px;
  height: 844px;
  border-radius: 55px;
  background: #0b0b0c;
  padding: 11px;
  position: relative;
  box-shadow:
    0 0 0 2px #3a3a3c,
    0 40px 80px rgba(0, 0, 0, 0.22),
    0 20px 40px rgba(0, 0, 0, 0.12);
}

.iphone16::before {
  /* subtle titanium rim highlight */
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 55px;
  pointer-events: none;
  background: linear-gradient(145deg, rgba(255,255,255,0.09) 0%, transparent 25%, transparent 75%, rgba(255,255,255,0.06) 100%);
}

.iphone16 .screen {
  width: 100%;
  height: 100%;
  border-radius: 44px;
  overflow: hidden;
  background: #fff;
  position: relative;
}

.iphone16 .dynamic-island {
  position: absolute;
  top: 11px;
  left: 50%;
  transform: translateX(-50%);
  width: 124px;
  height: 36px;
  border-radius: 20px;
  background: #000;
  z-index: 100;
}

.iphone16 .side-btn {
  position: absolute;
  background: #2a2a2c;
  border-radius: 2px;
}
.iphone16 .side-btn.silent { left: -2px; top: 98px; width: 3px; height: 28px; }
.iphone16 .side-btn.vol-up { left: -2px; top: 155px; width: 3px; height: 60px; }
.iphone16 .side-btn.vol-down { left: -2px; top: 228px; width: 3px; height: 60px; }
.iphone16 .side-btn.power { right: -2px; top: 186px; width: 3px; height: 96px; }

/* ===== iOS Status Bar ===== */
.ios-statusbar {
  height: 54px;
  padding: 18px 32px 0;
  font-family: -apple-system, "SF Pro", "SF Pro Text", system-ui;
  position: relative;
  z-index: 10;
  flex: 0 0 auto;
}
.ios-statusbar .ios-time {
  position: absolute;
  left: 32px;
  top: 18px;
  font-size: 16px;
  font-weight: 600;
  letter-spacing: -0.2px;
  color: #000;
  line-height: 1.3;
}
.ios-statusbar .ios-right {
  position: absolute;
  right: 28px;
  top: 18px;
  line-height: 1;
  white-space: nowrap;
  letter-spacing: 0;
  display: flex;
  align-items: center;
  gap: 10px;
}
.ios-statusbar .ios-right svg,
.ios-statusbar .ios-right .ios-net-label {
  display: inline-block !important;
  vertical-align: middle;
  margin: 0;
  flex-shrink: 0;
}
.ios-statusbar .ios-right svg:first-child { margin-left: 0; }
.ios-statusbar .ios-right .ios-battery-shell {
  display: inline-block;
  vertical-align: middle;
  margin: 0;
  flex-shrink: 0;
}
.ios-battery-shell {
  width: 26px;
  height: 13px;
  border: 1px solid rgba(0,0,0,0.35);
  border-radius: 3.5px;
  position: relative;
  padding: 1px;
  box-sizing: border-box;
}
.ios-battery-shell::after {
  content: "";
  position: absolute;
  right: -3px;
  top: 3.5px;
  width: 2px;
  height: 5px;
  background: rgba(0,0,0,0.35);
  border-radius: 0 1.5px 1.5px 0;
}
.ios-battery-fill {
  display: block;
  height: 100%;
  background: #000;
  border-radius: 1.5px;
}

/* ===== Screen container ===== */
.screen-inner {
  display: flex;
  flex-direction: column;
  height: 100%;
  background: #fff;
  position: relative;
}

/* ===== Messenger Header ===== */
.msg-header {
  display: grid;
  grid-template-columns: auto auto 1fr auto auto;
  column-gap: 8px;
  align-items: center;
  padding: 4px 12px 8px 6px;
  background: #fff;
  border-bottom: 1px solid #e4e6eb;
  flex: 0 0 auto;
  position: relative;
  z-index: 5;
}

.msg-header .back {
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: #0084ff;
}
.msg-header .avatar-stack {
  position: relative;
  width: 40px;
  height: 32px;
  flex: 0 0 40px;
}
.msg-header .avatar-stack .av {
  position: absolute;
  border-radius: 50%;
  background-size: cover;
  background-position: center;
  background-color: #e4e6eb;
  border: 2px solid #fff;
  box-shadow: 0 0 0 0.5px rgba(0,0,0,0.08);
  overflow: hidden;
}
.msg-header .avatar-stack .av.a1 {
  width: 26px; height: 26px;
  left: 0; bottom: 0; z-index: 2;
}
.msg-header .avatar-stack .av.a2 {
  width: 22px; height: 22px;
  right: 0; top: 0; z-index: 1;
}
.msg-header .avatar-stack.single .av.a1 {
  width: 34px; height: 34px;
  left: 3px; bottom: 0;
}
.msg-header .avatar-stack.single .av.a2 { display: none; }

.msg-header .title-wrap {
  display: flex;
  flex-direction: column;
  justify-content: center;
  min-width: 0;
  padding-left: 2px;
}
.msg-header .title {
  font-size: 14px;
  font-weight: 600;
  color: #050505;
  letter-spacing: -0.1px;
  line-height: 1.25;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 170px;
  outline: none;
}
.msg-header .subtitle {
  font-size: 11px;
  color: #65676b;
  line-height: 1.2;
  margin-top: 1px;
  outline: none;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 170px;
}

.msg-header .action {
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

/* ===== Conversation area ===== */
.conversation {
  flex: 1 1 auto;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 6px 10px 4px;
  background: #fff;
  scrollbar-width: none;
  -ms-overflow-style: none;
  position: relative;
}
.conversation::-webkit-scrollbar { display: none; }

/* Intro / group start card */
.chat-intro {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 24px 12px 18px;
  gap: 8px;
}
.chat-intro .intro-avatars {
  position: relative;
  width: 80px;
  height: 64px;
}
.chat-intro .intro-avatars .av {
  position: absolute;
  border-radius: 50%;
  background-size: cover;
  background-position: center;
  background-color: #e4e6eb;
  border: 3px solid #fff;
  box-shadow: 0 0 0 0.5px rgba(0,0,0,0.08);
}
.chat-intro .intro-avatars .av.a1 { width: 48px; height: 48px; left: 0; bottom: 0; z-index: 2; }
.chat-intro .intro-avatars .av.a2 { width: 42px; height: 42px; right: 0; top: 0; z-index: 1; }
.chat-intro .intro-name {
  font-size: 15px;
  font-weight: 600;
  color: #050505;
  margin-top: 6px;
}
.chat-intro .intro-sub {
  font-size: 12px;
  color: #65676b;
}
.chat-intro .intro-btn {
  margin-top: 10px;
  padding: 6px 14px;
  border-radius: 18px;
  background: #e4e6eb;
  color: #050505;
  font-size: 12px;
  font-weight: 600;
}

/* Date separator (inline) */
.date-sep {
  display: flex;
  justify-content: center;
  margin: 14px 0 6px;
}
.date-sep span {
  font-size: 11px;
  color: #65676b;
  font-weight: 600;
  letter-spacing: 0.1px;
}

/* ===== Message wrappers ===== */
.msg-row {
  display: flex;
  align-items: flex-end;
  margin-top: 2px;
  position: relative;
}
.msg-row.received { justify-content: flex-start; }
.msg-row.sent { justify-content: flex-end; }

.msg-row.first { margin-top: 10px; }

.msg-row .av-slot {
  width: 28px;
  height: 28px;
  margin-right: 6px;
  flex: 0 0 28px;
  align-self: flex-end;
}
.msg-row .av-slot .av {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background-size: cover;
  background-position: center;
  background-color: #e4e6eb;
}
.msg-row .av-slot.hidden .av { visibility: hidden; }

.msg-row .stack {
  display: flex;
  flex-direction: column;
  max-width: 72%;
}
.msg-row.sent .stack { align-items: flex-end; }
.msg-row.received .stack { align-items: flex-start; }

.sender-name {
  font-size: 11px;
  color: #65676b;
  margin: 8px 0 3px 0;
  padding-left: 12px;
  font-weight: 400;
}

/* Bubbles */
.bubble {
  font-size: 15px;
  line-height: 1.3;
  padding: 8px 12px;
  border-radius: 18px;
  max-width: 100%;
  word-wrap: break-word;
  word-break: break-word;
  position: relative;
  margin-top: 2px;
}
.bubble[contenteditable="true"] { cursor: text; }
.bubble[contenteditable="true"]:focus {
  outline: 2px solid #0084ff55;
  outline-offset: 1px;
}
.bubble[contenteditable="true"]:hover:not(:focus) {
  outline: 1px dashed rgba(0,132,255,0.35);
  outline-offset: 1px;
}
.bubble-row {
  display: flex;
  align-items: center;
  gap: 4px;
  position: relative;
}
.msg-row.sent .bubble-row { flex-direction: row-reverse; }
.bubble-del {
  opacity: 0;
  transition: opacity 0.15s;
  width: 24px;
  height: 24px;
  padding: 0;
  border: 0;
  background: #fff;
  box-shadow: 0 1px 4px rgba(0,0,0,0.15);
  border-radius: 50%;
  color: #65676b;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  flex: 0 0 24px;
}
.msg-row:hover .bubble-del { opacity: 1; }
.bubble-del:hover { color: #e41e3f; background: #fff5f5; }
.screen.--capturing .bubble-del { display: none !important; }
.msg-row.received .bubble {
  background: #f0f0f0;
  color: #050505;
}
.msg-row.sent .bubble {
  background: #0084ff;
  color: #fff;
}

/* bubble-burst corner shaping — iOS Messenger specifics */
/* received */
.msg-row.received .bubble.first { border-radius: 18px 18px 18px 4px; }
.msg-row.received .bubble.middle { border-radius: 4px 18px 18px 4px; }
.msg-row.received .bubble.last { border-radius: 4px 18px 18px 18px; }
.msg-row.received .bubble.solo { border-radius: 18px; }

/* sent */
.msg-row.sent .bubble.first { border-radius: 18px 18px 4px 18px; }
.msg-row.sent .bubble.middle { border-radius: 18px 4px 4px 18px; }
.msg-row.sent .bubble.last { border-radius: 18px 4px 18px 18px; }
.msg-row.sent .bubble.solo { border-radius: 18px; }

/* image + sticker bubbles */
.bubble.image {
  padding: 0;
  overflow: hidden;
  background: transparent !important;
  max-width: 225px;
}
.bubble.image img { display: block; width: 100%; height: auto; }
.msg-row.received .bubble.image { border-radius: 18px; }
.msg-row.sent .bubble.image { border-radius: 18px; }

.bubble.sticker {
  background: transparent !important;
  padding: 0 !important;
  border-radius: 0 !important;
  max-width: 140px;
}
.bubble.sticker img { width: 100%; height: auto; display: block; }

/* reply context above bubble */
.reply-context {
  margin-bottom: -10px;
  padding: 6px 12px 16px;
  border-radius: 14px;
  background: #e4e6eb;
  color: #65676b;
  font-size: 12px;
  max-width: 100%;
  position: relative;
  z-index: 0;
  line-height: 1.25;
}
.msg-row.sent .reply-context { align-self: flex-end; }
.reply-context .reply-to {
  font-size: 10px;
  font-weight: 600;
  color: #65676b;
  margin-bottom: 2px;
}
.reply-context .reply-text {
  color: #050505;
  font-size: 12px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  max-width: 180px;
}

/* Reactions pill */
.reactions {
  display: inline-flex;
  align-items: center;
  gap: 2px;
  padding: 2px 5px;
  background: #fff;
  border-radius: 14px;
  border: 1px solid #e4e6eb;
  box-shadow: 0 1px 2px rgba(0,0,0,0.08);
  font-size: 11px;
  margin-top: -6px;
  position: relative;
  z-index: 1;
  transform: translateY(-4px);
  align-self: flex-start;
}
.msg-row.sent .reactions { align-self: flex-end; transform: translateY(-4px) translateX(-6px); }
.msg-row.received .reactions { transform: translateY(-4px) translateX(6px); }
.reactions .count {
  color: #65676b;
  font-weight: 600;
  margin-left: 2px;
}

/* Seen indicator */
.seen-row {
  display: flex;
  justify-content: flex-end;
  align-items: center;
  gap: 4px;
  margin: 2px 2px 6px 0;
  font-size: 10px;
  color: #65676b;
}
.seen-row .seen-av {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background-size: cover;
  background-position: center;
  background-color: #bcc0c4;
  border: 1px solid #fff;
}
.seen-row .seen-check {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: #0084ff;
  color: #fff;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 9px;
}
.seen-row .seen-check.hollow {
  background: #fff;
  color: #0084ff;
  border: 1px solid #0084ff;
}

/* Voice message */
.bubble.voice {
  min-width: 180px;
  padding: 8px 12px;
}
.voice-inner {
  display: flex;
  align-items: center;
  gap: 10px;
}
.voice-play {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  background: rgba(255,255,255,0.3);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  flex: 0 0 26px;
}
.msg-row.received .voice-play {
  background: rgba(0,0,0,0.08);
  color: #050505;
}
.voice-wave {
  display: flex;
  align-items: center;
  gap: 2px;
  height: 20px;
  flex: 1;
}
.voice-wave span {
  display: block;
  width: 2.5px;
  border-radius: 2px;
  background: currentColor;
  opacity: 0.75;
}
.msg-row.received .voice-wave span { background: #b0b3b8; opacity: 1; }
.voice-duration {
  font-size: 11px;
  opacity: 0.85;
  min-width: 30px;
  text-align: right;
}

/* Typing indicator */
.typing-bubble {
  background: #f0f0f0;
  border-radius: 4px 18px 18px 18px;
  padding: 10px 14px;
  display: inline-flex;
  gap: 4px;
  align-items: center;
}
.typing-bubble .dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #8e8e93;
  animation: typing-bounce 1.2s infinite ease-in-out;
}
.typing-bubble .dot:nth-child(2) { animation-delay: 0.15s; }
.typing-bubble .dot:nth-child(3) { animation-delay: 0.3s; }
@keyframes typing-bounce {
  0%, 80%, 100% { opacity: 0.4; transform: translateY(0); }
  40% { opacity: 1; transform: translateY(-2px); }
}

/* Call bubble */
.call-wrap {
  display: flex;
  justify-content: center;
  margin: 14px 0 6px;
}
.call-bubble {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 14px;
  background: #f0f0f0;
  border-radius: 18px;
  max-width: 84%;
  color: #050505;
  font-size: 13px;
}
.call-bubble.missed { background: #fdecea; color: #e41e3f; }
.call-bubble .call-ic {
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex: 0 0 28px;
}
.call-bubble .call-txt { display: flex; flex-direction: column; line-height: 1.2; }
.call-bubble .call-title { font-weight: 600; font-size: 12px; }
.call-bubble .call-sub { font-size: 11px; opacity: 0.7; }

/* Reply swipe hint */
.swipe-hint {
  position: absolute;
  right: -30px;
  top: 50%;
  transform: translateY(-50%);
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: #f0f0f0;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #65676b;
  font-size: 14px;
  opacity: 0;
}
.msg-row.received:hover .swipe-hint { opacity: 0; } /* only shown on active drag — keeping hidden but wired */

/* ===== Compose bar ===== */
.compose {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 10px 10px;
  background: #fff;
  border-top: 1px solid #e4e6eb;
  flex: 0 0 auto;
}
.compose .c-ic {
  width: 30px;
  height: 30px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #0084ff;
  cursor: pointer;
  border-radius: 50%;
  flex: 0 0 30px;
}
.compose .c-ic svg { width: 24px; height: 24px; }
.compose .c-ic:hover { background: #f0f2f5; }
.compose .c-input {
  flex: 1 1 auto;
  background: #f0f2f5;
  border-radius: 18px;
  padding: 6px 6px 6px 14px;
  display: flex;
  align-items: center;
  min-height: 34px;
  color: #65676b;
  font-size: 15px;
  text-decoration: none;
}
.compose .c-input .fake-text {
  flex: 1;
  text-decoration: none;
  border: 0;
  outline: 0;
  background: transparent;
  color: #65676b;
  font-size: 15px;
  font-family: inherit;
  padding: 0;
}
.compose .c-input .c-emoji {
  width: 26px;
  height: 26px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #65676b;
}
.compose .c-input .c-emoji svg { width: 20px; height: 20px; }
.compose .c-like {
  width: 30px;
  height: 30px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #0084ff;
  flex: 0 0 30px;
}
.compose .c-like svg { width: 26px; height: 26px; }

/* Home indicator */
.home-indicator {
  position: absolute;
  left: 50%;
  bottom: 8px;
  transform: translateX(-50%);
  width: 134px;
  height: 5px;
  border-radius: 100px;
  background: #000;
  z-index: 100;
}

/* ===== Control Panel (restyled Messenger style) ===== */
.panel {
  background: #fff;
  border-radius: 20px;
  box-shadow: 0 1px 2px rgba(0,0,0,0.05), 0 10px 30px rgba(0,0,0,0.05);
  padding: 22px 20px;
  display: flex;
  flex-direction: column;
  gap: 22px;
}
.panel h2 {
  margin: 0 0 4px;
  font-size: 20px;
  font-weight: 700;
  color: #050505;
  letter-spacing: -0.3px;
}
.panel .panel-sub {
  font-size: 13px;
  color: #65676b;
  margin: 0 0 4px;
}
.panel section { display: flex; flex-direction: column; gap: 10px; }
.panel .section-title {
  font-size: 13px;
  font-weight: 600;
  color: #65676b;
  text-transform: uppercase;
  letter-spacing: 0.3px;
  margin-bottom: 2px;
}

.mem-list { display: flex; flex-wrap: wrap; gap: 8px; }
.mem-chip {
  display: flex;
  align-items: center;
  background: #f0f2f5;
  border-radius: 22px;
  padding: 3px 10px 3px 3px;
  gap: 8px;
  cursor: default;
  transition: background 0.15s;
}
.mem-chip:hover { background: #e4e6eb; }
.mem-chip .mem-av {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background-size: cover;
  background-position: center;
  background-color: #d2d4d7;
  flex: 0 0 32px;
  display: block;
  overflow: hidden;
}
.mem-chip .mem-av-overlay {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  background: rgba(0,0,0,0.35);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.15s;
}
.mem-chip .mem-av:hover .mem-av-overlay { opacity: 1; }
.mem-chip .mem-name {
  font-size: 13px;
  font-weight: 500;
  color: #050505;
  outline: none;
  max-width: 120px;
}
.mem-chip .mem-x {
  margin-left: 2px;
  color: #65676b;
  font-size: 14px;
  cursor: pointer;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  display: flex;

<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<script type="text/babel">
/* global React */
// messenger.jsx — iPhone 16 Pro Messenger group chat UI

const { useState, useEffect, useMemo, useRef } = React;

// --- helpers ---
const PhBack = () => (
  <svg width="14" height="22" viewBox="0 0 14 22" fill="none">
    <path d="M12 2 3 11l9 9" stroke="currentColor" strokeWidth="2.6" strokeLinecap="round" strokeLinejoin="round"/>
  </svg>
);
// Authentic iOS Messenger icons (filled blue, matches real app)
const PhPhone = () => (
  <svg width="22" height="22" viewBox="0 0 24 24" fill="#0084ff">
    <path d="M19.44 13.55c-.3 0-.53.08-.79.09-.53.02-1.02-.02-1.43-.08-.43-.06-.79.1-1.03.36l-1.79 1.79c-2.3-1.3-4.22-3.2-5.53-5.5l1.79-1.79c.26-.25.42-.6.36-1.03-.06-.41-.1-.9-.08-1.43.01-.26.08-.49.09-.79A1.44 1.44 0 0 0 9.58 3.7H5.17A1.5 1.5 0 0 0 3.7 5.32C4.12 14.28 9.7 19.85 18.65 20.3c.82.04 1.52-.66 1.52-1.48V14.4a1.44 1.44 0 0 0-1.48-1.47z"/>
  </svg>
);
const PhVideo = () => (
  <svg width="28" height="24" viewBox="0 0 28 24" fill="#0084ff">
    <rect x="1.2" y="4" width="16.8" height="16" rx="3.5"/>
    <path d="M19.5 10.2 25.2 7.1a1 1 0 0 1 1.48.88v8.04a1 1 0 0 1-1.48.88l-5.7-3.1z"/>
  </svg>
);
// Compose: solid blue filled buttons (match real Messenger)
const PhPlus = () => (
  <svg width="30" height="30" viewBox="0 0 30 30" fill="none">
    <circle cx="15" cy="15" r="14" fill="#0084ff"/>
    <path d="M15 8v14M8 15h14" stroke="#fff" strokeWidth="2.4" strokeLinecap="round"/>
  </svg>
);
const PhCamera = () => (
  <svg width="30" height="30" viewBox="0 0 30 30" fill="#0084ff">
    <path d="M4 9.4C4 8.1 5 7 6.3 7h2.5c.5 0 1-.28 1.24-.72l.7-1.23c.25-.44.74-.72 1.25-.72h5.98c.5 0 1 .28 1.25.72l.7 1.23c.25.44.74.72 1.25.72h2.5C23.1 7 24 8.1 24 9.4v10.2c0 1.3-.9 2.4-2.24 2.4H6.25C5 22 4 20.9 4 19.6V9.4z"/>
    <circle cx="14" cy="14.5" r="4.2" fill="#fff"/>
    <circle cx="14" cy="14.5" r="2.6" fill="#0084ff"/>
  </svg>
);
const PhPhoto = () => (
  <svg width="30" height="30" viewBox="0 0 30 30" fill="#0084ff">
    <rect x="4" y="5.5" width="22" height="19" rx="3.2"/>
    <circle cx="10.5" cy="11.5" r="1.9" fill="#fff"/>
    <path d="M5 21.5 11 16l4.5 3.8L19 16l7 6.5v.5a1.5 1.5 0 0 1-1.5 1.5H6.5A1.5 1.5 0 0 1 5 23v-1.5z" fill="#fff"/>
  </svg>
);
const PhMic = () => (
  <svg width="28" height="28" viewBox="0 0 28 28" fill="#0084ff">
    <rect x="10" y="4" width="8" height="14" rx="4"/>
    <path d="M5.5 13a8.5 8.5 0 0 0 17 0" stroke="#0084ff" strokeWidth="2.2" fill="none" strokeLinecap="round"/>
    <path d="M14 21.5v3.5" stroke="#0084ff" strokeWidth="2.2" strokeLinecap="round"/>
  </svg>
);
// Smiley INSIDE text field — gray outline
const PhSmile = () => (
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#65676b" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round">
    <circle cx="12" cy="12" r="9.5"/>
    <circle cx="9" cy="10" r="0.8" fill="#65676b"/>
    <circle cx="15" cy="10" r="0.8" fill="#65676b"/>
    <path d="M8.5 14.5c.8 1.3 2 2 3.5 2s2.7-.7 3.5-2"/>
  </svg>
);
// Thumbs-up — filled blue
const PhThumb = () => (
  <svg width="30" height="30" viewBox="0 0 30 30" fill="#0084ff">
    <path d="M2.5 13.5A1.7 1.7 0 0 1 4.2 11.8h2.8v13.5H4.2A1.7 1.7 0 0 1 2.5 23.6v-10zM8.7 11.8l4.4-7.3a2.3 2.3 0 0 1 4.3 1.7l-1 3.8a1.16 1.16 0 0 0 1.13 1.5h5.65a2.9 2.9 0 0 1 2.87 3.36l-1.4 8.48a2.9 2.9 0 0 1-2.87 2.41H8.7V11.8z"/>
  </svg>
);
const PhPlay = () => <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>;
const PhPhoneSm = ({missed}) => <svg width="18" height="18" viewBox="0 0 24 24" fill={missed?"#e41e3f":"#65676b"}><path d="M20.01 15.38a11.87 11.87 0 0 1-3.72-.59 1.03 1.03 0 0 0-1.06.24l-1.57 1.97a15.02 15.02 0 0 1-6.59-6.58l1.96-1.66a1 1 0 0 0 .25-1.02A11.87 11.87 0 0 1 8.69 4 1 1 0 0 0 7.69 3H4.19A.99.99 0 0 0 3.19 4.04C3.56 14.26 11.74 22.44 21.96 22.81a.99.99 0 0 0 1.04-1V18.4c0-.55-.45-.99-.99-1.02z"/></svg>;

// Avatar url — DiceBear supports CORS so html2canvas screenshots render faces.
function avatarUrl(seed) {
  const sanitized = encodeURIComponent(seed || 'anon');
  return `https://api.dicebear.com/7.x/avataaars/svg?seed=${sanitized}&radius=50&backgroundColor=b6e3f4,c0aede,d1d4f9,ffd5dc,ffdfbf`;
}
function hashCode(s) {
  let h = 0; for (let i = 0; i < s.length; i++) { h = (h << 5) - h + s.charCodeAt(i); h |= 0; }
  return h;
}

// Status bar
function IPhoneStatusBar({ time, battery = 82, network = 'wifi' }) {
  const netGlyph = (() => {
    if (network === 'wifi') {
      return <svg width="15" height="11" viewBox="0 0 16 12"><path d="M8 11.5a1.25 1.25 0 1 0 0-2.5 1.25 1.25 0 0 0 0 2.5zM12.1 6.9a5.8 5.8 0 0 0-8.2 0l1.3 1.3a4 4 0 0 1 5.6 0l1.3-1.3zM15 4a10 10 0 0 0-14 0l1.3 1.3a8.1 8.1 0 0 1 11.4 0L15 4z" fill="#000"/></svg>;
    }
    const label = network.toUpperCase();
    return <span className="ios-net-label" style={{fontSize:13, fontWeight:600, letterSpacing:'-0.02em', color:'#000', lineHeight:1}}>{label}</span>;
  })();
  return (
    <div className="ios-statusbar">
      <div className="ios-time">{time}</div>
      <div className="ios-right">
        {/* signal */}
        <svg width="17" height="11" viewBox="0 0 18 10"><rect x="0" y="6" width="3" height="4" rx="1" fill="#000"/><rect x="4" y="4" width="3" height="6" rx="1" fill="#000"/><rect x="8" y="2" width="3" height="8" rx="1" fill="#000"/><rect x="12" y="0" width="3" height="10" rx="1" fill="#000"/></svg>
        {netGlyph}
        <span className="ios-battery-shell">
          <span className="ios-battery-fill" style={{width: `${battery}%`}} />
        </span>
      </div>
    </div>
  );
}

// Header
function MessengerHeader({ groupName, subtitle, members, onNameChange, onSubChange }) {
  const av1 = members[0]?.avatar || avatarUrl('a');
  const av2 = members[1]?.avatar || avatarUrl('b');
  const single = members.length < 2;
  return (
    <div className="msg-header">
      <div className="back"><PhBack/></div>
      <div className={`avatar-stack ${single ? 'single' : ''}`}>
        <div className="av a1" style={{backgroundImage: `url(${av1})`}} />
        <div className="av a2" style={{backgroundImage: `url(${av2})`}} />
      </div>
      <div className="title-wrap">
        <span className="title" contentEditable suppressContentEditableWarning
          onBlur={e => onNameChange(e.currentTarget.textContent)}>{groupName}</span>
        <span className="subtitle" contentEditable suppressContentEditableWarning
          onBlur={e => onSubChange(e.currentTarget.textContent)}>{subtitle}</span>
      </div>
      <div className="action"><PhPhone/></div>
      <div className="action"><PhVideo/></div>
    </div>
  );
}

// Voice waveform
function VoiceWave({ bars = 28, sent }) {
  const heights = useMemo(() => Array.from({length: bars}, (_, i) => {
    const t = i / bars;
    const base = 6 + Math.sin(t * Math.PI * 3) * 5 + Math.cos(t * Math.PI * 7) * 3;
    return Math.max(4, Math.min(18, base + (i % 4) * 1.5));
  }), [bars]);
  return (
    <div className="voice-wave">
      {heights.map((h, i) => <span key={i} style={{height: h}} />)}
    </div>
  );
}

// Bubble content per type
function BubbleBody({ msg, sent, onEdit }) {
  if (msg.type === 'image') {
    return <div className="bubble image"><img src={msg.src} alt="" crossOrigin="anonymous" /></div>;
  }
  if (msg.type === 'sticker') {
    return <div className="bubble sticker"><img src={msg.src} alt="" crossOrigin="anonymous" /></div>;
  }
  if (msg.type === 'voice') {
    return (
      <div className={`bubble voice ${msg.pos || 'solo'}`}>
        <div className="voice-inner">
          <div className="voice-play"><PhPlay/></div>
          <VoiceWave sent={sent} />
          <span className="voice-duration">{msg.duration || '0:14'}</span>
        </div>
      </div>
    );
  }
  // Editable text bubble
  const handleBlur = (e) => {
    const txt = e.currentTarget.textContent;
    if (onEdit && txt !== msg.text) onEdit(txt);
  };
  return (
    <div
      className={`bubble ${msg.pos || 'solo'}`}
      contentEditable={!!onEdit}
      suppressContentEditableWarning
      onBlur={handleBlur}
      onKeyDown={e => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); e.currentTarget.blur(); }
        if (e.key === 'Escape') { e.currentTarget.textContent = msg.text; e.currentTarget.blur(); }
      }}
      spellCheck={false}
    >{msg.text}</div>
  );
}

// Single message row
function MessageRow({ msg, sent, showAvatar, showName, senderName, senderAvatar, onEdit, onDelete }) {
  const pos = msg.pos || 'solo';
  const cls = `msg-row ${sent ? 'sent' : 'received'} ${pos === 'first' || pos === 'solo' ? 'first' : ''}`;
  return (
    <>
      {showName && !sent && <div className="sender-name">{senderName}</div>}
      <div className={cls}>
        {!sent && (
          <div className={`av-slot ${showAvatar ? '' : 'hidden'}`}>
            <div className="av" style={{backgroundImage: `url(${senderAvatar})`}} />
          </div>
        )}
        <div className="stack">
          {msg.replyTo && (
            <div className="reply-context">
              <div className="reply-to">{msg.replyTo.name}</div>
              <div className="reply-text">{msg.replyTo.text}</div>
            </div>
          )}
          <div className="bubble-row">
            <BubbleBody msg={msg} sent={sent} onEdit={onEdit} />
            {onDelete && (
              <button className="bubble-del" onClick={onDelete} title="Delete this message" aria-label="Delete message">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
              </button>
            )}
          </div>
          {msg.reactions && msg.reactions.length > 0 && (
            <div className="reactions">
              {msg.reactions.map((r, i) => <span key={i}>{r.emoji}</span>)}
              {msg.reactions.length > 1 && <span className="count">{msg.reactions.length}</span>}
            </div>
          )}
        </div>
      </div>
    </>
  );
}

// Date divider
function DateSep({ label }) {
  return <div className="date-sep"><span>{label}</span></div>;
}

// Call bubble
function CallBubble({ missed, title, sub, onEditTitle, onEditSub, onDelete }) {
  return (
    <div className="call-wrap">
      <div className={`call-bubble ${missed ? 'missed' : ''}`}>
        <div className="call-ic"><PhPhoneSm missed={missed}/></div>
        <div className="call-txt">
          <div
            className="call-title"
            contentEditable={!!onEditTitle}
            suppressContentEditableWarning
            spellCheck={false}
            onBlur={e => onEditTitle && onEditTitle(e.currentTarget.textContent)}
            onKeyDown={e => { if (e.key==='Enter'){ e.preventDefault(); e.currentTarget.blur(); } }}
          >{title}</div>
          <div
            className="call-sub"
            contentEditable={!!onEditSub}
            suppressContentEditableWarning
            spellCheck={false}
            onBlur={e => onEditSub && onEditSub(e.currentTarget.textContent)}
            onKeyDown={e => { if (e.key==='Enter'){ e.preventDefault(); e.currentTarget.blur(); } }}
          >{sub}</div>
        </div>
        {onDelete && (
          <button className="bubble-del" onClick={onDelete} title="Delete call" style={{opacity:0}} aria-label="Delete call">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
          </button>
        )}
      </div>
    </div>
  );
}

// Typing indicator
function TypingIndicator({ avatar }) {
  return (
    <div className="msg-row received first" style={{marginTop: 8}}>
      <div className="av-slot">
        <div className="av" style={{backgroundImage: `url(${avatar})`}} />
      </div>
      <div className="stack">
        <div className="typing-bubble">
          <span className="dot"/><span className="dot"/><span className="dot"/>
        </div>
      </div>
    </div>
  );
}

// Conversation
function Conversation({ messages, members, meId, showTyping, typingBy, groupName, onEditMsg, onDeleteMsg }) {
  const memberById = Object.fromEntries(members.map(m => [m.id, m]));
  const scrollRef = useRef(null);
  useEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  }, [messages, showTyping]);

  // compute pos (first/middle/last/solo) based on same-sender adjacency
  const rows = useMemo(() => {
    const out = [];
    for (let i = 0; i < messages.length; i++) {
      const m = messages[i];
      if (m.type === 'date' || m.type === 'call') { out.push({...m, kind: m.type}); continue; }
      const prev = messages[i-1];
      const next = messages[i+1];
      const sameAsPrev = prev && prev.from === m.from && prev.type !== 'date' && prev.type !== 'call' && m.type !== 'image' && m.type !== 'sticker' && prev.type !== 'image' && prev.type !== 'sticker';
      const sameAsNext = next && next.from === m.from && next.type !== 'date' && next.type !== 'call' && m.type !== 'image' && m.type !== 'sticker' && next.type !== 'image' && next.type !== 'sticker';
      let pos = 'solo';
      if (sameAsPrev && sameAsNext) pos = 'middle';
      else if (sameAsPrev) pos = 'last';
      else if (sameAsNext) pos = 'first';
      out.push({...m, pos, showAvatar: !sameAsNext, showName: !sameAsPrev && m.from !== meId});
    }
    return out;
  }, [messages, meId]);

  return (
    <div className="conversation" ref={scrollRef}>
      <div className="chat-intro">
        <div className="intro-avatars">
          <div className="av a1" style={{backgroundImage: `url(${members[0]?.avatar})`}} />
          <div className="av a2" style={{backgroundImage: `url(${members[1]?.avatar})`}} />
        </div>
        <div className="intro-name">{groupName}</div>
        <div className="intro-sub">Messenger · {members.length} members</div>
        <div className="intro-btn">View group</div>
      </div>

      {rows.map((r, i) => {
        if (r.kind === 'date') return <DateSep key={i} label={r.label} />;
        if (r.kind === 'call') return <CallBubble key={i} missed={r.missed} title={r.title} sub={r.sub}
          onEditTitle={onEditMsg ? (text) => onEditMsg(r.id, {title: text}) : undefined}
          onEditSub={onEditMsg ? (text) => onEditMsg(r.id, {sub: text}) : undefined}
          onDelete={onDeleteMsg ? () => onDeleteMsg(r.id) : undefined}
        />;
        const sent = r.from === meId;
        const sender = memberById[r.from];
        return (
          <React.Fragment key={i}>
            <MessageRow
              msg={r}
              sent={sent}
              showAvatar={r.showAvatar}
              showName={r.showName && members.length > 2}
              senderName={sender?.name}
              senderAvatar={sender?.avatar}
              onEdit={onEditMsg ? (text) => onEditMsg(r.id, text) : undefined}
              onDelete={onDeleteMsg ? () => onDeleteMsg(r.id) : undefined}
            />
            {r.seenBy && r.seenBy.length > 0 && (
              <div className="seen-row">
                {r.seenBy.slice(0, 3).map((uid, idx) => (
                  <div key={idx} className="seen-av" style={{backgroundImage: `url(${memberById[uid]?.avatar})`}} />
                ))}
              </div>
            )}
            {r.delivered && sent && !r.seenBy && (
              <div className="seen-row">
                <span className="seen-check hollow">✓</span>
                <span>Delivered</span>
              </div>
            )}
          </React.Fragment>
        );
      })}

      {showTyping && <TypingIndicator avatar={memberById[typingBy]?.avatar} />}
    </div>
  );
}

const { useState: usePState, useEffect: usePEffect, useRef: usePRef } = React;

function DatePickerChip({ onPick }) {
  const [open, setOpen] = usePState(false);
  const initDate = new Date(Date.now() - 2*24*60*60*1000);
  const [year, setYear] = usePState(initDate.getFullYear());
  const [month, setMonth] = usePState(initDate.getMonth()); // 0-11
  const [day, setDay] = usePState(initDate.getDate());
  const [hour, setHour] = usePState(initDate.getHours());
  const [minute, setMinute] = usePState(initDate.getMinutes());
  const ref = usePRef(null);
  usePEffect(() => {
    if (!open) return;
    const h = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', h);
    return () => document.removeEventListener('mousedown', h);
  }, [open]);
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const confirm = () => {
    const d = new Date(year, month, Math.min(day, daysInMonth), hour, minute);
    onPick(d.toISOString());
    setOpen(false);
  };
  const quickYear = (offset) => {
    const d = new Date();
    d.setFullYear(d.getFullYear() + offset);
    setYear(d.getFullYear()); setMonth(d.getMonth()); setDay(d.getDate());
  };
  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const yearList = [];
  const curYear = new Date().getFullYear();
  for (let y = curYear; y >= curYear - 15; y--) yearList.push(y);
  const selectSx = {padding:'7px 8px', border:'1px solid #e4e6eb', borderRadius:8, fontSize:13, background:'#fff', flex:1, minWidth:0};
  return (
    <div ref={ref} style={{position:'relative', display:'inline-block'}}>
      <button className="btn secondary sm" onClick={() => setOpen(o => !o)}>🗓 Date</button>
      {open && (
        <div style={{
          position:'absolute', top:'calc(100% + 6px)', left:0, zIndex:50,
          background:'#fff', borderRadius:14, boxShadow:'0 12px 32px rgba(0,0,0,0.2)',
          border:'1px solid #e4e6eb', padding:14, width:300,
        }}>
          <div style={{fontSize:13, fontWeight:700, marginBottom:10, color:'#050505'}}>Insert date separator</div>
          <div style={{display:'flex', gap:4, marginBottom:10, flexWrap:'wrap'}}>
            {[-1,-2,-3,-5,-10].map(y => (
              <button key={y} className="btn ghost sm" style={{padding:'3px 8px', fontSize:11}} onClick={() => quickYear(y)}>{Math.abs(y)}y ago</button>
            ))}
          </div>
          <label style={{display:'block', fontSize:11, color:'#65676b', marginBottom:4, fontWeight:500}}>Date</label>
          <div style={{display:'flex', gap:6, marginBottom:10}}>
            <select value={month} onChange={e => setMonth(+e.target.value)} style={selectSx}>
              {MONTHS.map((m, i) => <option key={i} value={i}>{m}</option>)}
            </select>
            <select value={day} onChange={e => setDay(+e.target.value)} style={{...selectSx, flex:'0 0 70px'}}>
              {Array.from({length: daysInMonth}, (_, i) => i+1).map(d => <option key={d} value={d}>{d}</option>)}
            </select>
            <select value={year} onChange={e => setYear(+e.target.value)} style={{...selectSx, flex:'0 0 90px'}}>
              {yearList.map(y => <option key={y} value={y}>{y}</option>)}
            </select>
          </div>
          <label style={{display:'block', fontSize:11, color:'#65676b', marginBottom:4, fontWeight:500}}>Time</label>
          <div style={{display:'flex', gap:6, marginBottom:12, alignItems:'center'}}>
            <select value={hour} onChange={e => setHour(+e.target.value)} style={selectSx}>
              {Array.from({length: 24}, (_, i) => i).map(h => (
                <option key={h} value={h}>{((h%12)||12)} {h<12?'AM':'PM'}</option>
              ))}
            </select>
            <span style={{color:'#65676b'}}>:</span>
            <select value={minute} onChange={e => setMinute(+e.target.value)} style={selectSx}>
              {Array.from({length: 60}, (_, i) => i).map(m => (
                <option key={m} value={m}>{m.toString().padStart(2,'0')}</option>
              ))}
            </select>
          </div>
          <div style={{display:'flex', gap:6, justifyContent:'flex-end'}}>
            <button className="btn ghost sm" onClick={() => setOpen(false)}>Cancel</button>
            <button className="btn primary sm" onClick={confirm}>Insert</button>
          </div>
        </div>
      )}
    </div>
  );
}

function AddExtrasSection({ state, setState }) {
  const addCall = (missed) => {
    const msg = { id:'c'+Date.now(), type:'call', missed, title: missed? 'Missed voice call' : 'Voice call', sub: missed ? 'You missed a call' : '2 min 34 sec' };
    setState(s => ({...s, messages:[...s.messages, msg]}));
  };
  const addDate = (isoDateTime) => {
    const dt = isoDateTime ? new Date(isoDateTime) : new Date(Date.now() - 2*24*60*60*1000);
    const today = new Date();
    const diffDays = Math.floor((today.setHours(0,0,0,0) - new Date(dt).setHours(0,0,0,0)) / (24*60*60*1000));
    const time = dt.toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' }); // "4:07 PM"
    let label;
    if (diffDays === 0) label = `Today ${time}`;
    else if (diffDays === 1) label = `Yesterday ${time}`;
    else if (diffDays < 7 && diffDays > 0) {
      // "MON AT 4:07 PM"
      label = `${dt.toLocaleDateString('en-US', { weekday:'short' }).toUpperCase()} AT ${time}`;
    } else {
      // "APR 18 AT 4:07 PM"
      label = `${dt.toLocaleDateString('en-US', { month:'short', day:'numeric' }).toUpperCase()} AT ${time}`;
    }
    setState(s => ({...s, messages:[...s.messages, { id:'d'+Date.now(), type:'date', label, iso: dt.toISOString() }]}));
  };
  const addReaction = () => {
    const emojis = ['❤️','😂','👍','😮','😢','🔥'];
    const pick = emojis[Math.floor(Math.random()*emojis.length)];
    setState(s => {
      const msgs = [...s.messages];
      for (let i = msgs.length - 1; i >= 0; i--) {
        if (msgs[i].type !== 'date' && msgs[i].type !== 'call') {
          msgs[i] = {...msgs[i], reactions: [...(msgs[i].reactions||[]), {emoji: pick}]};
          break;
        }
      }
      return {...s, messages: msgs};
    });
  };
  const addReply = () => {
    setState(s => {
      const lastReal = [...s.messages].reverse().find(m => m.type !== 'date' && m.type !== 'call');
      if (!lastReal) return s;
      const replyTo = {
        name: s.members.find(x => x.id === lastReal.from)?.name || 'Unknown',
        text: lastReal.text || (lastReal.type === 'image' ? 'Photo' : lastReal.type === 'sticker' ? 'Sticker' : lastReal.type === 'voice' ? 'Voice message' : ''),
      };
      return {...s, messages:[...s.messages, { id:'r'+Date.now(), from: s.meId, type:'text', text:'Totally agree 🙌', replyTo }]};
    });
  };
  const markSeen = () => {
    setState(s => {
      const msgs = [...s.messages];
      const others = s.members.filter(m => m.id !== s.meId).map(m => m.id).slice(0, 3);
      for (let i = msgs.length - 1; i >= 0; i--) {
        if (msgs[i].from === s.meId && msgs[i].type !== 'date' && msgs[i].type !== 'call') {
          msgs[i] = {...msgs[i], seenBy: others};
          break;
        }
      }
      return {...s, messages: msgs};
    });
  };
  const clearChat = () => setState(s => ({...s, messages: []}));
  const undo = () => setState(s => ({...s, messages: s.messages.slice(0, -1)}));

  return (
    <section>
      <div className="section-title">Add to chat</div>
      <div className="row">
        <button className="btn secondary sm" onClick={addReply}>↩︎ Reply</button>
        <button className="btn secondary sm" onClick={addReaction}>❤️ React</button>
        <button className="btn secondary sm" onClick={markSeen}>✓ Mark seen</button>
        <button className="btn secondary sm" onClick={() => addCall(false)}>📞 Call</button>
        <button className="btn secondary sm" onClick={() => addCall(true)}>☎️ Missed</button>
        <DatePickerChip onPick={addDate} />
        <button className="btn ghost sm" onClick={undo}>Undo</button>
      </div>
    </section>
  );
}

    { id:'m5', from:'u1', type:'text', text:'I\'m in. I can drive', seenBy:['u2','u3','u4'] },
    { id:'m6', from:'u2', type:'voice', duration:'0:23' },
    { id:'m7', from:'u2', type:'text', text:'^^ listen to that for the vibe', replyTo:{name:'Maya', text:'Voice message'} },
    { id:'m8', from:'u4', type:'image', src:'https://picsum.photos/seed/beach-day/400/300', reactions:[{emoji:'🔥'}] },
    { id:'m9', from:'u1', type:'text', text:'wait is that from last summer??' },
    { id:'m10', from:'u3', type:'text', text:'yeah pulled it up to convince everyone 😂' },
    { id:'c1', type:'call', missed:false, title:'Voice call', sub:'4 min 12 sec · with Maya, Jordan' },
    { id:'m11', from:'u1', type:'text', text:'ok sun chairs + speaker — I got it', seenBy:['u2','u3','u4'] },
  ];
}

const STORAGE_KEY = 'messenger-clone-state-v1';

function loadSavedState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    const s = JSON.parse(raw);
    if (!s || !s.members || !s.messages) return null;
    return s;
  } catch (err) { return null; }
}

function App() {
  const [state, setState] = useAppState(() => {
    const saved = loadSavedState();
    if (saved) return saved;
    return {
      members: initialMembers,
      meId: 'u1',
      groupName: TWEAK_DEFAULTS.groupName,
      subtitle: TWEAK_DEFAULTS.subtitle,
      statusTime: '9:41',
      battery: 82,
      network: 'wifi',
      typingOn: TWEAK_DEFAULTS.typingOn,
      typingBy: 'u3',
      messages: initialMessages(),
    };
  });

  // Persist entire state to localStorage on every change (debounced)
  useAppEffect(() => {
    const id = setTimeout(() => {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
      catch (err) { console.warn('Save failed', err); }
    }, 200);
    return () => clearTimeout(id);
  }, [state]);
  const [tweakMode, setTweakMode] = useAppState(false);

  useAppEffect(() => {
    const handler = (e) => {
      if (!e.data || typeof e.data !== 'object') return;
      if (e.data.type === '__activate_edit_mode') setTweakMode(true);
      if (e.data.type === '__deactivate_edit_mode') setTweakMode(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type:'__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const pushTweak = (partial) => {
    window.parent.postMessage({ type:'__edit_mode_set_keys', edits: partial }, '*');
  };

  const [toast, setToast] = useAppState(null);
  const showToast = (msg) => {
    setToast(msg);
    setTimeout(() => setToast(null), 2000);
  };

  const takeScreenshot = async () => {
    const el = document.querySelector('.iphone16 .screen');
    if (!el || !window.html2canvas) { showToast('Screenshot not available'); return; }
    // Blur any focused element so the caret doesn't render into the screenshot
    if (document.activeElement && typeof document.activeElement.blur === 'function') {
      document.activeElement.blur();
    }
    window.getSelection && window.getSelection().removeAllRanges();
    showToast('Capturing…');
    // Temporarily remove rounded corners / scaling artifacts + hide home indicator
    const prevRadius = el.style.borderRadius;
    const prevTransform = el.style.transform;
    el.style.borderRadius = '0';
    el.style.transform = 'none';
    el.classList.add('--capturing');
    const home = el.querySelector('.home-indicator');
    const prevHome = home && home.style.display;
    if (home) home.style.display = 'none';
    // Wait a frame so the blur + selection removal takes effect
    await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));
    try {
      const rect = el.getBoundingClientRect();
      const canvas = await window.html2canvas(el, {
        backgroundColor: '#ffffff',
        scale: 2,
        useCORS: true,
        allowTaint: true,
        width: rect.width,
        height: rect.height,
        windowWidth: rect.width,
        windowHeight: rect.height,
        x: 0,
        y: 0,
        scrollX: 0,
        scrollY: 0,
      });
      const link = document.createElement('a');
      link.download = 'messenger-chat-' + Date.now() + '.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
      showToast('Screenshot saved ✓');
    } catch (err) {
      console.error(err);
      showToast('Screenshot failed');
    } finally {
      el.style.borderRadius = prevRadius;
      el.style.transform = prevTransform;
      el.classList.remove('--capturing');
      if (home) home.style.display = prevHome || '';
    }
  };

  const exportChat = () => {
    const data = {
      version: 1,
      exportedAt: new Date().toISOString(),
      state: {
        members: state.members,
        meId: state.meId,
        groupName: state.groupName,
        subtitle: state.subtitle,
        statusTime: state.statusTime,
        battery: state.battery,
        network: state.network,
        typingOn: state.typingOn,
        typingBy: state.typingBy,
        messages: state.messages,
      },
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.download = 'messenger-chat-' + (state.groupName || 'export').replace(/[^a-z0-9]/gi, '_').toLowerCase() + '.json';
    link.click();
    URL.revokeObjectURL(url);
    showToast('Chat exported ✓');
  };

  const importChat = (file) => {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        const s = data.state || data;
        if (!s.members || !s.messages) { showToast('Invalid chat file'); return; }
        setState(cur => ({ ...cur, ...s }));
        showToast('Chat imported ✓');
      } catch (err) {
        console.error(err);
        showToast('Invalid JSON');
      }
    };
    reader.readAsText(file);
  };

  return (
    <>
      <div className="app-header">
        <div className="brand"><div className="logo-dot"/> Messenger Clone</div>
        <div className="tag">iPhone 16 Pro · iOS Messenger</div>
        <div className="spacer"/>
        <button className="h-btn" onClick={takeScreenshot} title="Save phone as PNG">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7zM20 4h-3.2L15 2H9L7.2 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2zm-8 14a6 6 0 1 1 0-12 6 6 0 0 1 0 12z"/></svg>
          Screenshot
        </button>
        <button className="h-btn" onClick={exportChat} title="Download chat as JSON">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
          Export
        </button>
        <label className="h-btn" title="Load chat from JSON">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M19 13h-4v6H9v-6H5l7-7 7 7zM5 4v2h14V4H5z"/></svg>
          Import
          <input type="file" accept="application/json" style={{display:'none'}} onChange={e => { importChat(e.target.files[0]); e.target.value=''; }} />
        </label>
        <button
          className="h-btn"
          title="Wipe saved chat in this browser and restore defaults"
          onClick={() => {
            if (!confirm('This will erase the chat saved in this browser and restore the demo conversation. Continue?')) return;
            localStorage.removeItem(STORAGE_KEY);
            location.reload();
          }}
          style={{color:'#65676b'}}
        >
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.65 6.35A8 8 0 0 0 12 4a8 8 0 1 0 7.74 10h-2.08A6 6 0 1 1 12 6a5.9 5.9 0 0 1 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
          Reset
        </button>
      </div>
      {toast && <div className="toast">{toast}</div>}
      <div className="app-shell">
        <div className="phone-col">
          <MessengerPhone state={state} setState={setState} />
        </div>
        <div className="panel-col">
          <ControlPanel state={state} setState={setState} />
        </div>
      </div>

      {tweakMode && (
        <div style={{
          position:'fixed', right:20, bottom:20, width:280, background:'#fff',
          borderRadius:16, boxShadow:'0 10px 30px rgba(0,0,0,0.18)',
          padding:16, zIndex:2000, border:'1px solid #e4e6eb',
        }}>
          <div style={{fontSize:14, fontWeight:700, marginBottom:10}}>Tweaks</div>
          <div className="field">
            <label>Group name</label>
            <input type="text" value={state.groupName}
              onChange={e => { setState(s => ({...s, groupName:e.target.value})); pushTweak({ groupName:e.target.value }); }}/>
          </div>
          <div className="field" style={{marginTop:8}}>
            <label>Subtitle</label>
            <input type="text" value={state.subtitle}
              onChange={e => { setState(s => ({...s, subtitle:e.target.value})); pushTweak({ subtitle:e.target.value }); }}/>
          </div>
          <div style={{marginTop:10}}>
            <Toggle on={state.typingOn} label="Typing indicator"
              onChange={v => { setState(s => ({...s, typingOn:v})); pushTweak({ typingOn:v }); }} />
          </div>
        </div>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
</body>
</html>
